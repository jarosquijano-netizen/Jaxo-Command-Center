[build]
builder = "NIXPACKS"

[deploy]
startCommand = "cd backend && gunicorn --bind 0.0.0.0:$PORT --workers 4 --timeout 120 app:app"
healthcheckPath = "/health"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[environment]
FLASK_ENV = "production"
FLASK_DEBUG = "False"
PYTHONUNBUFFERED = "1"
